<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="generationOverlayStyles.css">
  <link rel="stylesheet" href="skipButtonStyles.css">
  <style type="text/css">
    html,
    body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #overlay-container {
      width: 960px;
      height: 540px;
    }



    /* Your style here... (feel free to remove this example styling) */

  </style>
</head>

<script src="./AAS.js"> </script>
<body>

<div id="overlay-brand" class="overlay brand">
  <img src="poweredBy.png" class="poweredBy" alt="Powered By AAS"/>
</div>
<div id="overlay-generation" class="overlay videoGeneration">
  <img src="Logo2.png" class="logo" alt="AAS Logo"/>
  <div id="spinner" class="loader">✨</div>
  <div id="buffering-text" class="generationText">
    Generating...
  </div>
</div>

  <div id="overlay-container">
    <!-- We've added a sample button. Feel free to remove it: -->
    <div id="skip" class="skipContainer">
      <button id="skipButton" class="gradientText"></button>
    </div>
  </div>

  <script type="text/javascript">
    (function(window, document){
      // This is how you tell the parent window that the ad was successfully skipped.
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }

      const skipContainer = document.getElementById('skip')
      const skipButton = document.getElementById('skipButton')

      let state_executions = 0

      // Listen for messages from the game shell
      window.addEventListener('message', (event) => {
        if (!event.data || !event.data.type) return

        if (event.data.type === 'adStarted') {
          // Show the skip button when the ad starts
          sendToParent({ type: 'pause' })
          generateVideoAd()

          //window.location.replace("https://{ad.company.ulr}");
          //state_executions++
          //skipButton.style.display = 'block'
          //let animateEmojis = spawnEmojiOverlay()
          //animateEmojis()
        }

        if (event.data.type ==='timeupdate'){
          let waitTime = Math.max(event.data.duration/4,15)
          if (event.data.currentTime > waitTime){
            skipContainer.style.pointerEvents = 'all'
            skipButton.innerHTML = "Skip Ad &#9656"
          }else {
            skipContainer.style.pointerEvents = 'none'
            let remainingTime =(Math.round(waitTime)-Math.round(event.data.currentTime)).toString()
            skipButton.innerText = `Skip Ad in ${remainingTime}`
          }
        }

        if (event.data.type ==='timeupdate' && event.data.currentTime > 1) {
          skipContainer.style.display = 'block'
        }

        if (event.data.type === 'adFinished') {
          skipButton.style.display = 'none';
          window.top.postMessage({ type: 'fail' }, '*');
        }
      });

      skipButton.addEventListener('click', () => {
          state_executions++
          skipContainer.style.display = 'none'
          generateVideoAd()
      });

    })(window, document);
  </script>
</body>
</html>
